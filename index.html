<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>将棋定跡ツリー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#0e0b07;color:#e8d5a8;min-height:100vh}

header{background:linear-gradient(135deg,#1e1208,#2c1a0a);padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:2px solid #8b5c1a}
header h1{font-size:18px;color:#d4a850;font-weight:bold;letter-spacing:.08em}
header .sub{font-size:12px;color:#8b7040;letter-spacing:.05em}

#app{display:flex;gap:0;height:calc(100vh - 53px)}

/* Left panel */
#left{flex-shrink:0;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;background:#0e0b07;border-right:1px solid #2a1a08}

/* Move history */
#move-history{font-size:11px;color:#8b7040;text-align:center;min-height:18px;letter-spacing:.04em;max-width:500px;line-height:1.6}

/* Board wrapper */
.board-outer{position:relative}
.col-labels{display:flex;padding-left:22px}
.col-label{width:52px;text-align:center;font-size:11px;color:#6b5030;font-weight:bold}
.board-main{display:flex}
.row-labels{display:flex;flex-direction:column;padding-top:0}
.row-label{height:52px;width:20px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#6b5030;font-weight:bold}

#board{
  border:3px solid #5a3010;
  display:grid;
  grid-template-columns:repeat(9,52px);
  grid-template-rows:repeat(9,52px);
  background:#c8921e;
  background-image:
    linear-gradient(rgba(0,0,0,.08) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,.08) 1px,transparent 1px);
  background-size:52px 52px;
  box-shadow:0 4px 24px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,200,80,.1);
}

.cell{
  border:1px solid rgba(80,40,10,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:21px;font-weight:bold;cursor:pointer;
  transition:background .1s;
  position:relative;
}
.cell:hover{background:rgba(255,220,80,.15)}
.cell.last-move{background:rgba(80,200,80,.25)!important;box-shadow:inset 0 0 0 2px rgba(80,200,80,.5)}

.piece-s{color:#1a0800;text-shadow:0 1px 0 rgba(255,200,100,.3)}
.piece-g{color:#06082a;transform:rotate(180deg);display:inline-block;text-shadow:0 1px 0 rgba(200,220,255,.3)}
.piece-promo{color:#bb1100!important}

/* Right panel */
#right{flex:1;overflow-y:auto;background:#130f08;display:flex;flex-direction:column}
#right::-webkit-scrollbar{width:4px}
#right::-webkit-scrollbar-track{background:#0e0b07}
#right::-webkit-scrollbar-thumb{background:#3a2510;border-radius:2px}

#panel-header{padding:16px 20px 12px;border-bottom:1px solid #2a1a08;flex-shrink:0}
#panel-title{font-size:15px;color:#d4a850;font-weight:bold;letter-spacing:.06em}
#panel-note{font-size:11px;color:#6b5030;margin-top:3px}

#panel-body{padding:16px 20px;flex:1}

/* Step controls */
.step-bar{display:flex;gap:8px;margin-bottom:16px}
.step-btn{
  padding:6px 14px;background:#1e1208;border:1px solid #3a2510;
  color:#c8a060;font-size:14px;border-radius:4px;cursor:pointer;
  transition:all .15s;
}
.step-btn:hover:not(:disabled){background:#2c1a08;border-color:#8b5c1a;color:#d4a850}
.step-btn:disabled{opacity:.25;cursor:default}

/* Joseki list */
.joseki-card{
  padding:12px 16px;background:#1a1108;border:1px solid #2a1a08;
  border-left:3px solid #5a3010;border-radius:0 6px 6px 0;
  cursor:pointer;margin-bottom:8px;transition:all .15s;
}
.joseki-card:hover{background:#221608;border-left-color:#8b5c1a}
.joseki-card.active{background:#221608;border-left-color:#d4a850}
.joseki-card-name{font-size:14px;color:#e8d5a8;font-weight:bold}
.joseki-card-note{font-size:11px;color:#6b5030;margin-top:3px}

/* Tree */
.back-btn{
  font-size:12px;color:#8b7040;cursor:pointer;margin-bottom:14px;
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border:1px solid #2a1a08;border-radius:4px;
  background:#1a1108;transition:all .15s;
}
.back-btn:hover{color:#d4a850;border-color:#3a2510}

.tree-wrap{font-size:13px}
.tree-node-row{display:flex;align-items:flex-start;margin:1px 0}
.move-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:3px;cursor:pointer;
  border:1px solid #2a1a08;background:#1a1108;
  color:#c8a860;transition:all .12s;white-space:nowrap;
  font-size:13px;
}
.move-chip:hover{background:#221608;border-color:#3a2510}
.move-chip.active{background:#2c1a08;border-color:#d4a850;color:#d4a850;font-weight:bold}
.move-chip .side-s{color:#c04020;margin-right:1px}
.move-chip .side-g{color:#3060cc;margin-right:1px}
.move-note{font-size:10px;color:#5a4020;margin-left:6px;align-self:center;white-space:nowrap}
.tree-children{margin-left:16px;padding-left:10px;border-left:1px solid #2a1a08}
.branch-div{font-size:10px;color:#4a3010;padding:4px 0;display:flex;align-items:center;gap:6px}
.branch-div::after{content:'';flex:1;height:1px;background:#2a1a08}

/* Move number */
.move-num{font-size:10px;color:#4a3010;width:20px;text-align:right;flex-shrink:0;align-self:center;margin-right:2px}
</style>
</head>
<body>
<header>
  <h1>将棋定跡ツリー</h1>
  <span class="sub">対振り飛車急戦形</span>
</header>
<div id="app">
  <div id="left">
    <div id="move-history">（初期局面）</div>
    <div class="board-outer">
      <div class="col-labels" id="col-labels"></div>
      <div class="board-main">
        <div id="board"></div>
        <div class="row-labels" id="row-labels"></div>
      </div>
    </div>
  </div>
  <div id="right">
    <div id="panel-header">
      <div id="panel-title">定跡を選んでください</div>
      <div id="panel-note"></div>
    </div>
    <div id="panel-body">
      <div id="no-data" style="color:#4a3010;padding:20px;text-align:center">読み込み中...</div>
    </div>
  </div>
</div>

<script>
const DATA_URL = 'data.json';

const PC = {FU:'歩',KY:'香',KE:'桂',GI:'銀',KI:'金',KA:'角',HI:'飛',OU:'玉',TO:'と',NY:'杏',NK:'圭',NG:'全',UM:'馬',RY:'龍'};
const PROMO = {FU:'TO',KY:'NY',KE:'NK',GI:'NG',KA:'UM',HI:'RY'};
const COL = ['９','８','７','６','５','４','３','２','１'];
const ROW = ['一','二','三','四','五','六','七','八','九'];

// Board: arr[r][c], r=0 top(row1), c=0 rightmost(col1)
function initBoard() {
  const B = Array.from({length:9},()=>Array(9).fill(null));
  const bk = ['KY','KE','GI','KI','OU','KI','GI','KE','KY'];
  for(let c=0;c<9;c++){B[8][c]={t:bk[c],s:0,p:false};B[0][c]={t:bk[c],s:1,p:false}}
  B[7][7]={t:'KA',s:0,p:false};B[7][1]={t:'HI',s:0,p:false};
  B[1][7]={t:'HI',s:1,p:false};B[1][1]={t:'KA',s:1,p:false};
  for(let c=0;c<9;c++){B[6][c]={t:'FU',s:0,p:false};B[2][c]={t:'FU',s:1,p:false}}
  return B;
}

function applyMove(B,mv){
  const N=B.map(r=>r.map(c=>c?{...c}:null));
  const[tr,tc]=mv.to;
  if(mv.drop){N[tr][tc]={t:mv.piece,s:mv.side,p:false}}
  else{const[fr,fc]=mv.from;const pc=N[fr][fc];if(!pc)return N;N[fr][fc]=null;N[tr][tc]={t:mv.promote?(PROMO[pc.t]||pc.t):pc.t,s:pc.s,p:mv.promote||pc.p}}
  return N;
}

// Render board
function renderBoard(board, lastTo) {
  // Col labels
  const cl = document.getElementById('col-labels');
  cl.innerHTML = '';
  cl.style.cssText = 'display:flex;padding-left:22px';
  COL.forEach(l=>{const d=document.createElement('div');d.className='col-label';d.textContent=l;cl.appendChild(d)});

  // Row labels
  const rl = document.getElementById('row-labels');
  rl.innerHTML = '';

  const grid = document.getElementById('board');
  grid.innerHTML = '';

  for(let dr=0;dr<9;dr++){
    const lbl=document.createElement('div');lbl.className='row-label';lbl.textContent=ROW[dr];rl.appendChild(lbl);
    for(let dc=0;dc<9;dc++){
      const ar=dr,ac=8-dc;
      const cell=document.createElement('div');cell.className='cell';
      if(lastTo&&lastTo[0]===ar&&lastTo[1]===ac)cell.classList.add('last-move');
      const pc=board[ar][ac];
      if(pc){
        const sp=document.createElement('span');
        sp.textContent=PC[pc.t]||'?';
        sp.className=pc.s===1?'piece-g':'piece-s';
        if(pc.p)sp.classList.add('piece-promo');
        cell.appendChild(sp);
      }
      grid.appendChild(cell);
    }
  }
}

// State
let roots=[], nodeMap={}, currentNode=null;

function getPath(node){const p=[];let c=node;while(c){p.unshift(c);c=c._parent}return p}
function getBoardAt(node){
  let b=initBoard();
  getPath(node).forEach(n=>{if(n.move)b=applyMove(b,n.move)});
  return b;
}

function selectNode(node){
  currentNode=node;
  const board=getBoardAt(node);
  renderBoard(board,node.move?node.move.to:null);
  const path=getPath(node).filter(n=>n.move);
  document.getElementById('move-history').textContent=
    path.length?path.map(n=>(n.move.side===0?'▲':'△')+n.move_text).join(' '):'（初期局面）';
  renderPanel();
}

function renderPanel(){
  const title=document.getElementById('panel-title');
  const note=document.getElementById('panel-note');
  const body=document.getElementById('panel-body');
  body.innerHTML='';

  if(!currentNode||currentNode._isRoot===undefined){
    title.textContent='定跡を選んでください';
    note.textContent='';
    roots.forEach(r=>{
      const card=document.createElement('div');card.className='joseki-card';
      card.innerHTML=`<div class="joseki-card-name">${r.name||'(無名)'}</div>${r.note?`<div class="joseki-card-note">${r.note}</div>`:''}`;
      card.onclick=()=>selectNode(r);body.appendChild(card);
    });
    return;
  }

  let root=currentNode;while(root._parent)root=root._parent;
  title.textContent=root.name||'定跡';
  note.textContent=root.note||'';

  // Back
  const back=document.createElement('div');back.className='back-btn';
  back.innerHTML='← 定跡一覧';back.onclick=()=>{currentNode=null;renderBoard(initBoard(),null);document.getElementById('move-history').textContent='（初期局面）';renderPanel()};
  body.appendChild(back);

  // Step controls
  const bar=document.createElement('div');bar.className='step-bar';
  const mk=(txt,dis,fn)=>{const b=document.createElement('button');b.className='step-btn';b.textContent=txt;b.disabled=dis;b.onclick=fn;return b};
  bar.appendChild(mk('|◀',!currentNode._parent,()=>selectNode(root)));
  bar.appendChild(mk('◀',!currentNode._parent,()=>{if(currentNode._parent)selectNode(currentNode._parent)}));
  bar.appendChild(mk('▶',!currentNode.children||!currentNode.children.length,()=>{if(currentNode.children?.length)selectNode(currentNode.children[0])}));
  body.appendChild(bar);

  // Tree
  let moveNum=0;
  function renderNode(node,depth){
    const wrap=document.createElement('div');
    if(node.move){
      moveNum++;
      const row=document.createElement('div');row.className='tree-node-row';
      const num=document.createElement('div');num.className='move-num';num.textContent=moveNum+'.';
      const chip=document.createElement('div');chip.className='move-chip';
      if(currentNode&&currentNode.id===node.id)chip.classList.add('active');
      const side=document.createElement('span');side.className=node.move.side===0?'side-s':'side-g';side.textContent=node.move.side===0?'▲':'△';
      chip.appendChild(side);chip.appendChild(document.createTextNode(node.move_text||''));
      chip.onclick=()=>selectNode(node);
      row.appendChild(num);row.appendChild(chip);
      if(node.note){const nt=document.createElement('div');nt.className='move-note';nt.textContent=node.note;row.appendChild(nt)}
      wrap.appendChild(row);
    }
    if(node.children?.length){
      const ch=document.createElement('div');ch.className='tree-children';
      node.children.forEach((c,i)=>{
        if(i>0){const div=document.createElement('div');div.className='branch-div';div.textContent='分岐';ch.appendChild(div)}
        const savedNum=moveNum;
        ch.appendChild(renderNode(c,depth+1));
        if(i<node.children.length-1)moveNum=savedNum;
      });
      wrap.appendChild(ch);
    }
    return wrap;
  }
  body.appendChild(renderNode(root,0));
}

async function loadNodes(){
  try{const r=await fetch(DATA_URL+'?t='+Date.now());if(!r.ok)return null;const j=await r.json();return j.joseki||null}
  catch(e){return null}
}

async function init(){
  // Build board labels
  renderBoard(initBoard(),null);

  let data=await loadNodes();
  if(!data||!data.length){document.getElementById('no-data').textContent='データが見つかりません';return}

  const nodes=data.map(n=>({...n,move:n.move?(typeof n.move==='string'?JSON.parse(n.move):n.move):null}));
  nodeMap={};nodes.forEach(n=>{nodeMap[n.id]={...n,children:[],_parent:null,_isRoot:!n.parent_id}});
  roots=[];
  nodes.forEach(n=>{
    const nd=nodeMap[n.id];
    if(!n.parent_id||!nodeMap[n.parent_id])roots.push(nd);
    else{nodeMap[n.parent_id].children.push(nd);nd._parent=nodeMap[n.parent_id]}
  });

  document.getElementById('no-data')?.remove();
  renderPanel();
}

init();
</script>
</body>
</html>
