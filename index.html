<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>将棋定跡ツリー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f0e8;color:#222;min-height:100vh}
header{background:#2c1810;color:#f0d090;padding:12px 16px;font-size:18px;font-weight:bold;display:flex;align-items:center;gap:12px}
header span{font-size:13px;opacity:.7;font-weight:normal}

#app{display:flex;gap:16px;padding:16px;max-width:1100px;margin:0 auto;flex-wrap:wrap}

/* Board */
#board-wrap{flex-shrink:0}
.col-labels{display:flex;padding-left:22px;margin-bottom:2px}
.col-label{width:52px;text-align:center;font-size:12px;color:#666}
.board-row{display:flex}
.row-label{width:20px;height:52px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#666}
#board{border:2px solid #6b4c2a;display:grid;grid-template-columns:repeat(9,52px);grid-template-rows:repeat(9,52px);background:#dcbb6b}
.cell{border:1px solid #8b6040;display:flex;align-items:center;justify-content:center;cursor:default;font-size:20px;font-weight:bold;position:relative}
.cell.last-move{background:rgba(80,180,80,.4)}
.piece-sente{color:#1a0000}
.piece-gote{color:#1a1a7a;transform:rotate(180deg);display:inline-block}
.piece-promo{color:#cc2200!important}

/* Tree panel */
#tree-wrap{flex:1;min-width:260px;max-width:500px}
.panel-title{font-size:15px;font-weight:bold;color:#2c1810;padding-bottom:8px;border-bottom:2px solid #8b6040;margin-bottom:12px}
.back-btn{font-size:13px;padding:4px 10px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;margin-bottom:12px;display:inline-block}
.back-btn:hover{background:#f0e8d0}
.joseki-card{padding:10px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;margin-bottom:6px;font-size:14px;font-weight:bold}
.joseki-card:hover{background:#f0e8d0}
.joseki-card.active{background:#2c1810;color:#f0d090;border-color:#2c1810}
.joseki-card .sub{font-size:11px;font-weight:normal;opacity:.7;margin-top:2px}

/* Move tree */
.tree-line{display:flex;align-items:flex-start;margin:2px 0}
.move-btn{padding:3px 10px;border-radius:4px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:13px;display:inline-block;white-space:nowrap}
.move-btn:hover{background:#f0e8d0}
.move-btn.active{background:#2c1810;color:#fff;border-color:#2c1810}
.move-btn.s0{border-left:3px solid #c04000}
.move-btn.s1{border-left:3px solid #2244aa}
.children{margin-left:16px;padding-left:8px;border-left:2px solid #ddd}
.branch-sep{font-size:11px;color:#888;padding:4px 0;margin-left:4px}
.note-tip{font-size:11px;color:#888;margin-left:6px;align-self:center}
.step-controls{display:flex;gap:8px;margin-top:12px}
.step-btn{padding:6px 16px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;font-size:14px}
.step-btn:hover{background:#f0e8d0}
.step-btn:disabled{opacity:.3;cursor:default}
.move-path{font-size:12px;color:#888;margin-bottom:8px;line-height:1.8}
#no-data{color:#888;padding:20px;text-align:center}
</style>
</head>
<body>
<header>将棋定跡ツリー <span>対振り飛車急戦形</span></header>
<div id="app">
  <div id="board-wrap"></div>
  <div id="tree-wrap">
    <div class="panel-title" id="panel-title">定跡を選んでください</div>
    <div id="panel-body"><div id="no-data">読み込み中...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://lrrbequsnlegwqtzdwwb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxycmJlcXVzbmxlZ3dxdHpkd3diIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Mzk0NzAsImV4cCI6MjA5NjMxNTQ3MH0.peqhzmPu_7TbP7ssovJSnM2A0LKAF3uNfGuWs9kWJqk';

// ===== PIECES =====
const PC = {FU:'歩',KY:'香',KE:'桂',GI:'銀',KI:'金',KA:'角',HI:'飛',OU:'玉',TO:'と',NY:'杏',NK:'圭',NG:'全',UM:'馬',RY:'龍'};
const PROMO = {FU:'TO',KY:'NY',KE:'NK',GI:'NG',KA:'UM',HI:'RY'};
const COL_LBL = ['９','８','７','６','５','４','３','２','１'];
const ROW_LBL = ['一','二','三','四','五','六','七','八','九'];

// ===== BOARD =====
// board[arr_row][arr_col]: arr_row 0=top(shogi row1), arr_col 0=rightmost(shogi col1)
// shogi "col,row" → arr: arr_row=row-1, arr_col=col-1
// display dc=0 is leftmost=col9 → arr_col = 8-dc

function initBoard() {
  const B = Array.from({length:9}, () => Array(9).fill(null));
  const back = ['KY','KE','GI','KI','OU','KI','GI','KE','KY']; // arr_col 0=col1 .. 8=col9
  for (let c=0;c<9;c++) {
    B[8][c] = {t:back[c],s:0,p:false}; // sente row9=arr8
    B[0][c] = {t:back[c],s:1,p:false}; // gote  row1=arr0
  }
  B[7][7]={t:'KA',s:0,p:false}; // 8八=col8,row8 → arr[7][7]
  B[7][1]={t:'HI',s:0,p:false}; // 2八=col2,row8 → arr[7][1]
  B[1][7]={t:'HI',s:1,p:false}; // 8二=col8,row2 → arr[1][7]
  B[1][1]={t:'KA',s:1,p:false}; // 2二=col2,row2 → arr[1][1]
  for (let c=0;c<9;c++) {
    B[6][c]={t:'FU',s:0,p:false}; // sente pawns row7=arr6
    B[2][c]={t:'FU',s:1,p:false}; // gote  pawns row3=arr2
  }
  return B;
}

function applyMove(board, mv) {
  const B = board.map(r => r.map(c => c?{...c}:null));
  const [tr,tc] = mv.to;
  if (mv.drop) {
    B[tr][tc] = {t:mv.piece, s:mv.side, p:false};
  } else {
    const [fr,fc] = mv.from;
    const pc = B[fr][fc];
    if (!pc) return B;
    B[fr][fc] = null;
    B[tr][tc] = {t: mv.promote ? (PROMO[pc.t]||pc.t) : pc.t, s:pc.s, p: mv.promote||pc.p};
  }
  return B;
}

// ===== RENDER BOARD =====
function renderBoard(board, lastTo) {
  const wrap = document.getElementById('board-wrap');
  wrap.innerHTML = '';

  const colRow = document.createElement('div');
  colRow.className = 'col-labels';
  COL_LBL.forEach(l => {
    const d = document.createElement('div');
    d.className = 'col-label'; d.textContent = l;
    colRow.appendChild(d);
  });
  wrap.appendChild(colRow);

  const boardEl = document.createElement('div');
  boardEl.style.display = 'flex';

  const grid = document.createElement('div');
  grid.id = 'board';

  const rowLbls = document.createElement('div');
  rowLbls.style.display = 'flex';
  rowLbls.style.flexDirection = 'column';

  for (let dr=0;dr<9;dr++) {
    const rl = document.createElement('div');
    rl.className = 'row-label'; rl.textContent = ROW_LBL[dr];
    rowLbls.appendChild(rl);

    for (let dc=0;dc<9;dc++) {
      const ar=dr, ac=8-dc;
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (lastTo && lastTo[0]===ar && lastTo[1]===ac) cell.classList.add('last-move');
      const pc = board[ar][ac];
      if (pc) {
        const sp = document.createElement('span');
        sp.textContent = PC[pc.t]||'?';
        sp.className = pc.s===1 ? 'piece-gote' : 'piece-sente';
        if (pc.p) sp.classList.add('piece-promo');
        cell.appendChild(sp);
      }
      grid.appendChild(cell);
    }
  }

  boardEl.appendChild(grid);
  boardEl.appendChild(rowLbls);
  wrap.appendChild(boardEl);
}

// ===== TREE STATE =====
let roots = [];
let nodeMap = {};
let currentNode = null;
let stepPath = []; // path from root to currentNode

function getPathToNode(node) {
  const path = [];
  let cur = node;
  while (cur) { path.unshift(cur); cur = cur._parent; }
  return path;
}

function getBoardAt(node) {
  const path = getPathToNode(node);
  let b = initBoard();
  for (const n of path) if (n.move) b = applyMove(b, n.move);
  return b;
}

function selectNode(node) {
  currentNode = node;
  stepPath = getPathToNode(node);
  const board = getBoardAt(node);
  const lastTo = node.move ? node.move.to : null;
  renderBoard(board, lastTo);
  renderPanel();
}

// ===== PANEL =====
function renderPanel() {
  const title = document.getElementById('panel-title');
  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  if (!currentNode || currentNode._isRoot === undefined) {
    // Joseki list
    title.textContent = '定跡を選んでください';
    roots.forEach(r => {
      const card = document.createElement('div');
      card.className = 'joseki-card';
      card.innerHTML = r.name || '(無名)';
      if (r.note) card.innerHTML += `<div class="sub">${r.note}</div>`;
      card.onclick = () => selectNode(r);
      body.appendChild(card);
    });
    return;
  }

  // Find root of current branch
  let root = currentNode;
  while (root._parent) root = root._parent;
  title.textContent = root.name || '定跡';

  // Back button
  const back = document.createElement('div');
  back.className = 'back-btn';
  back.textContent = '← 一覧';
  back.onclick = () => { currentNode = null; renderBoard(initBoard(), null); renderPanel(); };
  body.appendChild(back);

  // Move path breadcrumb
  if (stepPath.length > 1) {
    const bc = document.createElement('div');
    bc.className = 'move-path';
    bc.textContent = stepPath.filter(n=>n.move).map((n,i)=>(n.move.side===0?'▲':'△')+n.move_text).join(' ');
    body.appendChild(bc);
  }

  // Step controls
  const ctrl = document.createElement('div');
  ctrl.className = 'step-controls';

  const btnFirst = document.createElement('button');
  btnFirst.className = 'step-btn'; btnFirst.textContent = '|◀';
  btnFirst.disabled = !currentNode._parent;
  btnFirst.onclick = () => selectNode(root);

  const btnPrev = document.createElement('button');
  btnPrev.className = 'step-btn'; btnPrev.textContent = '◀';
  btnPrev.disabled = !currentNode._parent;
  btnPrev.onclick = () => { if (currentNode._parent) selectNode(currentNode._parent); };

  const btnNext = document.createElement('button');
  btnNext.className = 'step-btn'; btnNext.textContent = '▶';
  btnNext.disabled = !currentNode.children || currentNode.children.length === 0;
  btnNext.onclick = () => { if (currentNode.children && currentNode.children.length > 0) selectNode(currentNode.children[0]); };

  ctrl.appendChild(btnFirst);
  ctrl.appendChild(btnPrev);
  ctrl.appendChild(btnNext);
  body.appendChild(ctrl);

  // Tree view
  const treeWrap = document.createElement('div');
  treeWrap.style.marginTop = '16px';

  function renderNode(node, depth) {
    const wrap = document.createElement('div');
    if (node.move) {
      const line = document.createElement('div');
      line.className = 'tree-line';
      const btn = document.createElement('div');
      btn.className = 'move-btn s' + node.move.side;
      if (currentNode && currentNode.id === node.id) btn.classList.add('active');
      btn.textContent = (node.move.side===0?'▲':'△') + (node.move_text||'');
      btn.onclick = () => selectNode(node);
      line.appendChild(btn);
      if (node.note) {
        const note = document.createElement('span');
        note.className = 'note-tip'; note.textContent = node.note;
        line.appendChild(note);
      }
      wrap.appendChild(line);
    }
    if (node.children && node.children.length) {
      const ch = document.createElement('div');
      ch.className = 'children';
      node.children.forEach((c, i) => {
        if (i > 0) {
          const sep = document.createElement('div');
          sep.className = 'branch-sep'; sep.textContent = '┌ 分岐';
          ch.appendChild(sep);
        }
        ch.appendChild(renderNode(c, depth+1));
      });
      wrap.appendChild(ch);
    }
    return wrap;
  }

  treeWrap.appendChild(renderNode(root, 0));
  body.appendChild(treeWrap);
}

// ===== SUPABASE =====
async function loadNodes() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/joseki_nodes?select=*&order=created_at.asc', {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
    });
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

// ===== SAMPLE DATA (used when Supabase is empty) =====
// Coords: [arr_row, arr_col] where arr_row=shogi_row-1, arr_col=shogi_col-1
// e.g. "7六" = col7,row6 → arr[5][6]
const SAMPLE = [
  {id:'root1', parent_id:null, name:'対四間飛車急戦', move_text:null, move:null, note:'四間飛車に対する急戦形'},
  // ▲7六歩: 7七→7六 = arr[6][6]→arr[5][6]
  {id:'n1', parent_id:'root1', move_text:'7六歩', move:{from:[6,6],to:[5,6],side:0,piece:'FU',promote:false,drop:false}, note:''},
  // △3四歩: 3三→3四 = arr[2][2]→arr[3][2]
  {id:'n2', parent_id:'n1', move_text:'3四歩', move:{from:[2,2],to:[3,2],side:1,piece:'FU',promote:false,drop:false}, note:''},
  // ▲2六歩: 2七→2六 = arr[6][1]→arr[5][1]
  {id:'n3', parent_id:'n2', move_text:'2六歩', move:{from:[6,1],to:[5,1],side:0,piece:'FU',promote:false,drop:false}, note:''},
  // △4二飛: 8二→4二 = arr[1][7]→arr[1][3]  ← 四間飛車
  {id:'n4', parent_id:'n3', move_text:'4二飛', move:{from:[1,7],to:[1,3],side:1,piece:'HI',promote:false,drop:false}, note:'四間飛車'},
  // 分岐A: ▲2五歩 (棒銀準備): 2六→2五 = arr[5][1]→arr[4][1]
  {id:'n5a', parent_id:'n4', move_text:'2五歩', move:{from:[5,1],to:[4,1],side:0,piece:'FU',promote:false,drop:false}, note:'棒銀系'},
  // 分岐B: ▲4八銀 (急戦矢倉系): 3九→4八 = arr[8][2]→arr[7][3]
  {id:'n5b', parent_id:'n4', move_text:'4八銀', move:{from:[8,2],to:[7,3],side:0,piece:'GI',promote:false,drop:false}, note:'急戦矢倉系'},
  // 分岐A続き: △3三角: 2二→3三 = arr[1][1]→arr[2][2]
  {id:'n6a', parent_id:'n5a', move_text:'3三角', move:{from:[1,1],to:[2,2],side:1,piece:'KA',promote:false,drop:false}, note:'飛車先受け'},
  // ▲3八銀: 3九→3八 = arr[8][2]→arr[7][2]
  {id:'n7a', parent_id:'n6a', move_text:'3八銀', move:{from:[8,2],to:[7,2],side:0,piece:'GI',promote:false,drop:false}, note:'棒銀始動'},
];

// ===== INIT =====
async function init() {
  renderBoard(initBoard(), null);

  let data = await loadNodes();
  if (!data || data.length === 0) data = SAMPLE;

  // parse move field
  const nodes = data.map(n => ({
    ...n,
    move: n.move ? (typeof n.move === 'string' ? JSON.parse(n.move) : n.move) : null
  }));

  // build tree
  nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = {...n, children:[], _parent:null, _isRoot:!n.parent_id}; });
  roots = [];
  nodes.forEach(n => {
    const node = nodeMap[n.id];
    if (!n.parent_id || !nodeMap[n.parent_id]) {
      roots.push(node);
    } else {
      const parent = nodeMap[n.parent_id];
      parent.children.push(node);
      node._parent = parent;
    }
  });

  document.getElementById('no-data')?.remove();
  renderPanel();
}

init();
</script>
</body>
</html>
